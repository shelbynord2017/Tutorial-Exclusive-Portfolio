<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library</title>
    <link rel="stylesheet" href="style.css">
    <script src="app.js" defer></script>
    <script src="https://kit.fontawesome.com/8377626e52.js" crossorigin="anonymous"></script>
</head>
<body>
    <section id="landing-page">
        <nav>
            <figure>
                <img id="personal-logo" src="./assets/david__logo.svg" >
            </figure>
            <ul class="nav__link--list">
              <li class="nav__link">
                <a href="#" class="
                nav__link--anchor 
                link__hover-effect 
                link__hover-effect--black
                ">About</a>
              </li>  
              <li class="nav__link">
                <a href="#" class="
                nav__link--anchor 
                link__hover-effect 
                link__hover-effect--black
                ">Project</a>
              </li>  
              <li class="nav__link">
                <a href="#" class="
                nav__link--anchor 
                link__hover-effect 
                link__hover-effect--black
                ">Contact</a>
              </li> 
              <li class="nav__link click">
                <a href="#" class="
                nav__link--anchor 
                link__hover-effect 
                link__hover-effect--black
                "><i class="fa-solid fa-circle-half-stroke"></i></a>
              </li>  
            </ul>
        </nav>
        <header class="header">
          <div class="header__content">
            <h1 class="title">Hey</h1>
            <h1 class="title orange">I'm Shelby</h1>
            <p class="header__para">I'm a <span class="orange">Frontend Software Engineer</span> with a strong passion for building web applications with great user experiences.
              <br>
              Here's a bit more <span class="orange">about me</span>.
            </p>
          </div>
          <div class="social__list">
            <a href="https://google.com" target="_blank" class="social__link click">
              <i class="fab fa-linkedin-in"></i>
            </a>
            <a href="https://github.com" target="_blank" class="social__link click">
              <i class="fab fa-github"></i>
            </a>
            <a href="./assets/David Bragg Resume.pdf" target="_blank" class="social__link click">
              <i class="fa-solid fa-file-pdf"></i>
            </a>
          </div>
        </header>
        <button class="mail__btn click">
          <i class="fas fa-envelope"></i>
        </button>
        <a href="#projects" class="scroll">
          <div class="scroll__icon click"></div>
        </a>
    </section>
        
</body>
</html>
